# PostgreSQL opcional: rode na raiz do projeto com `docker compose up -d`
# Depois no backend use: DATABASE_URL="postgresql://postgres:postgres@localhost:5432/touchpad?schema=public"
# e altere backend/prisma/schema.prisma para provider = "postgresql" antes de rodar prisma migrate.

services:
  postgres:
    image: postgres:16-alpine
    container_name: mjc-test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: touchpad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
