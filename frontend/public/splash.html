<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MJC Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0c10; }
    .splash-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    .status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.5rem;
      background: linear-gradient(to top, rgba(11, 12, 16, 0.95), rgba(11, 12, 16, 0.7));
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status-bar .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00BDFF;
      animation: pulse 1s ease-in-out infinite;
    }
    .status-bar .text {
      flex: 1;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <img src="/splash.png" alt="MJC Player" class="splash-image" />
  <div class="status-bar" role="status" aria-live="polite">
    <span class="dot" aria-hidden="true"></span>
    <span class="text" id="status-text">A iniciar…</span>
  </div>
  <script>
    (function () {
      var messages = [
        "A iniciar…",
        "Conectando ao servidor…",
        "Conectando à API…",
        "A carregar recursos…",
        "A preparar interface…",
        "Abrindo MJC Player…"
      ];
      var el = document.getElementById("status-text");
      var i = 0;
      function next() {
        el.textContent = messages[i % messages.length];
        i += 1;
        setTimeout(next, 450);
      }
      next();
    })();
  </script>
</body>
</html>
